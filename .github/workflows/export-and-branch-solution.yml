name: export-and-branch-solution
# Export solution from DEV environment, unpack it, and prepare/commit a branch

on:
  workflow_dispatch:
    inputs:
      solution_name:
        description: "name of the solution to work on from Power Platform"
        required: true
        default: "ALMLab"
      solution_exported_folder:
        description: "folder for staging the exported solution (do not change)"
        required: true
        default: "out/exported"
      solution_folder:
        description: "folder for staging the unpacked solution (do not change)"
        required: true
        default: "out/solutions"
      solution_target_folder:
        description: "repo folder to check in (do not change)"
        required: true
        default: "solutions"

env:
  ENVIRONMENT_URL: "https://org9dca05dd.crm9.dynamics.com"
  CLIENT_ID: "2b90092e-67c7-4f5b-ab0d-806e63d26e10"
  TENANT_ID: "5a3479ae-949c-40ec-b00d-7d82a1729e23"

permissions:
  contents: write

jobs:
  export-from-dev:
    runs-on: windows-latest
    env:
      RUNNER_DEBUG: 1

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Install Power Platform Tools
        uses: microsoft/powerplatform-actions/actions-install@v1

      - name: WhoAmI
        uses: microsoft/powerplatform-actions/who-am-i@v1
        with:
          environment-url: ${{ env.ENVIRONMENT_URL }}
          app-id: ${{ env.CLIENT_ID }}
          client-secret: ${{ secrets.PowerPlatformSPN }}
          tenant-id: ${{ env.TENANT_ID }}

      - name: Export solution
        uses: microsoft/powerplatform-actions/export-solution@v1
        with:
          environment-url: ${{ env.ENVIRONMENT_URL }}
          app-id: ${{ env.CLIENT_ID }}
          client-secret: ${{ secrets.PowerPlatformSPN }}
          tenant-id: ${{ env.TENANT_ID }}
          solution-name: ${{ github.event.inputs.solution_name }}
          solution-output-file: ${{ github.event.inputs.solution_exported_folder }}/${{ github.event.inputs.solution_name }}.zip

      - name: Unpack solution
        uses: microsoft/powerplatform-actions/unpack-solution@v1
        with:
          solution-file: ${{ github.event.inputs.solution_exported_folder }}/${{ github.event.inputs.solution_name }}.zip
          solution-folder: ${{ github.event.inputs.solution_folder }}/${{ github.event.inputs.solution_name }}
          solution-type: "Unmanaged"
          overwrite-files: true

      - name: Branch solution (prepare PR)
        uses: microsoft/powerplatform-actions/branch-solution@v1
        with:
          solution-folder: ${{ github.event.inputs.solution_folder }}/${{ github.event.inputs.solution_name }}
          solution-target-folder: ${{ github.event.inputs.solution_target_folder }}/${{ github.event.inputs.solution_name }}
          repo-token: ${{ secrets.GITHUB_TOKEN }}
          allow-empty-commit: true
